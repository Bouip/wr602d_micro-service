parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\MailerService:
        arguments:
            $noReplyEmail: '%env(MAILER_NO_REPLY_EMAIL)%'
            $replyEmail: '%env(MAILER_REPLY_EMAIL)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    App\Security\ApiAuthenticator:
        arguments:
            $apiKeyName: '%env(MAILER_API_KEY_NAME)%'
            $apiKeyValue: '%env(MAILER_API_KEY_VALUE)%'
            